async function doUpload(file){
const status=document.getElementById('up-status');
if(!status)return;
// Validate file type
const ext=file.name.split('.').pop().toLowerCase();
if(!['csv','xlsx','xls','tsv'].includes(ext)){
status.innerHTML='<div style="color:var(--rd);padding:8px;background:rgba(240,96,96,.08);border-radius:5px;border:1px solid rgba(240,96,96,.2)"><b>Invalid format</b> — Upload a CSV, XLSX, or XLS file. Got: .'+ext+'</div>';
return;}
if(file.size>16*1024*1024){
status.innerHTML='<div style="color:var(--rd);padding:8px;background:rgba(240,96,96,.08);border-radius:5px;border:1px solid rgba(240,96,96,.2)"><b>File too large</b> — Maximum 16MB.</div>';
return;}
status.innerHTML='<div style="color:var(--ac);display:flex;align-items:center;gap:6px"><div class="sp" style="width:14px;height:14px;border-width:2px"></div> Uploading '+file.name+'...</div>';
const form=new FormData();
form.append('file',file);
form.append('name',document.getElementById('up-name')?.value||'Upload');
try{
const r=await fetch('/api/v1/portfolios/upload',{method:'POST',headers:{'Authorization':'Bearer '+TK},body:form});
const d=await r.json();
if(d.error){
status.innerHTML='<div style="color:var(--rd);padding:10px;background:rgba(240,96,96,.08);border-radius:6px;border:1px solid rgba(240,96,96,.2)"><div style="font-weight:600;margin-bottom:4px">Upload Error</div><div style="font-size:10px">'+d.error+'</div><div style="font-size:9px;color:var(--t3);margin-top:4px">Check file format: must have a symbol/ticker column. Supported: CSV, XLSX, XLS.</div></div>';
return;}
PID=d.portfolio_id;
const mkts=Object.keys(d.markets_found||{}).join(', ')||'auto-detected';
status.innerHTML='<div style="padding:12px;background:rgba(45,212,160,.08);border-radius:6px;border:1px solid rgba(45,212,160,.25)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:22px;color:var(--gn)">&#10003;</span><span style="font-weight:600;color:var(--gn);font-size:12px">Portfolio Loaded Successfully</span></div><div style="font-size:10px;color:var(--t2)">'+d.holdings_count+' holdings detected on '+mkts+'</div></div>';
// Auto compute after 1s
setTimeout(async()=>{
status.innerHTML+='<div style="margin-top:8px;color:var(--ac);display:flex;align-items:center;gap:6px;font-size:10px"><div class="sp" style="width:12px;height:12px;border-width:2px"></div> Processing 8 risk layers...</div>';
try{DT=await api('/api/v1/portfolios/'+PID+'/compute-all');
status.innerHTML+='<div style="margin-top:4px;color:var(--gn);font-size:10px">&#10003; All layers computed. Redirecting...</div>';
setTimeout(()=>{buildLayout();VW='overview';renderView();},800);
}catch(e2){status.innerHTML+='<div style="margin-top:4px;color:var(--rd);font-size:10px">Processing error: '+e2.message+'. Try refreshing.</div>';}
},1000);
}catch(e){status.innerHTML='<div style="color:var(--rd);padding:10px;background:rgba(240,96,96,.08);border-radius:6px;border:1px solid rgba(240,96,96,.2)"><div style="font-weight:600;margin-bottom:4px">Upload Failed</div><div style="font-size:10px">'+e.message+'</div><div style="font-size:9px;color:var(--t3);margin-top:4px">Check your connection and try again.</div></div>';}
}

showLogin();
</script>
